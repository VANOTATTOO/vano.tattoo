<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANOTATTOO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}


body{
  font-family:'Montserrat',sans-serif;
  color:#fff;
  overflow-x:hidden;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
    url('assets/bg/bg.png');

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
/* NOISE (дорогой эффект) */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url('assets/bg/noise.png');
  opacity:0.04;
  pointer-events:none;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* HERO */
.hero{
  padding:100px 10px 60px;
}

.hero h1{
  font-size:52px;
  font-weight:800;
  line-height:0.9;
  letter-spacing:2px;
}

/* GLASS BLOCK */
.glass{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:20px;
  margin-top:20px;
}

/* TITLE */
.title{
  font-size:18px;
  margin-bottom:15px;
  opacity:0.8;
}

/* CAROUSEL */
.carousel{
  width:100%;
  height:300px;
  perspective:1200px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.carousel-track{
  width:220px;
  height:220px;
  position:relative;
  transform-style:preserve-3d;
  animation:rotate 30s linear infinite;
}

.carousel-track img{
  position:absolute;
  width:180px;
  height:220px;
  object-fit:cover;
  border-radius:16px;
  left:20px;
  top:0;

  filter:grayscale(100%) brightness(0.9);
  transition:0.4s;
}

.carousel-track img:hover{
  filter:grayscale(0%) brightness(1);
  transform:scale(1.08);
}

@keyframes rotate{
  from{ transform:rotateY(0deg);}
  to{ transform:rotateY(360deg);}
}

/* PRICE */
.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* BUTTON */
.btn{
  display:block;
  margin-top:12px;
  padding:14px;
  text-align:center;
  border-radius:14px;

  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);

  color:#fff;
  text-decoration:none;
  font-weight:600;

  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* MOBILE FIX */
@media(max-width:420px){
  .hero h1{
    font-size:44px;
  }
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h1>VANO<br>TATTOO</h1>
</div>

<!-- CAROUSEL -->
<div class="glass">
  <div class="title">МОИ РАБОТЫ</div>

  <div class="carousel">
    <div class="carousel-track" id="carousel">

      <img src="assets/works/work-1.jpg">
      <img src="assets/works/work-2.jpg">
      <img src="assets/works/work-3.jpg">
      <img src="assets/works/work-4.jpg">
      <img src="assets/works/work-5.jpg">
      <img src="assets/works/work-6.jpg">

    </div>
  </div>

</div>

<!-- PRICE -->
<div class="glass">
  <div class="title">ПРАЙС</div>

  <div class="row"><span>Мини тату</span><span>3000₽</span></div>
  <div class="row"><span>Сеанс</span><span>6000₽</span></div>

</div>

<!-- CONTACT -->
<div class="glass">
  <div class="title">ЗАПИСЬ</div>

  <a href="https://t.me/yourname" class="btn">Telegram</a>
  <a href="https://instagram.com/yourname" class="btn">Instagram</a>

</div>

</div>

<script>
const images = document.querySelectorAll('#carousel img');
const count = images.length;
const angle = 360 / count;

images.forEach((img, i) => {
  img.style.transform = `rotateY(${i * angle}deg) translateZ(320px)`;
});
</script>

</body>
</html>
